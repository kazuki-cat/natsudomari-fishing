; 本番用 opcache設定(docker-compose.prod.ymlでphpコンテナにマウントして使う)
; 開発の php.ini(custom.ini)でopcache.enable=0にしたものを、ここで1に上書きしてON

; opcacheを有効化
opcache.enable=1

; メモリ上にキャッシュするサイズ(MB)
opcache.memory_consumption=128

; キャッシュできるファイル数の上限(Laravelはファイル数が多いので高めに設定)
opcache.max_accelerated_files=10000

; ファイルの更新チェックをしない(本番はコードが変わらないの前提 = 最速)
; デプロイでコードを変えたらopcacheをクリア(php artisan / コンテナ再起動)する
opcache.validate_timestamps=0
