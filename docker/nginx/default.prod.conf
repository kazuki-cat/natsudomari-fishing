## 本番用 Nginx設定(docker-compose.prod.ymlでこのファイルをマウントして使う)
# http(80)は証明書更新用パス以外をhttpsへリダイレクト、https(443)でSSL終端してアプリへ振り分ける

# --- HTTP(80) ---
server {
  listen 80;
  server_name natsudomari-fishing.duckdns.org; # このドメイン宛のリクエストを処理

  # Let's Encryptの証明書更新(webroot方式)で使うチャレンジ用パスだけは80で通す
  location /.well-known/acme-challenge/ {
    root /var/www/certbot; # この物理フォルダの中身を返す
  }

  # それ以外はすべてHTTPS(443)へ恒久リダイレクト
  # $host=ドメイン名 / $request_uri=パス以降
  location / {
    return 301 https://$host$request_uri;
  }
}

# --- HTTPS(443) ---
server {
  listen 443 ssl; # 443番ポートをSSL(暗号化)付きで待ち受け
  server_name natsudomari-fishing.duckdns.org;

  # Let's Encryptの証明書(certbotが取得・/etc/letsencryptをマウントして参照)
  ssl_certificate /etc/letsencrypt/live/natsudomari-fishing.duckdns.org/fullchain.pem; # 証明書本体(中間証明書込み)
  ssl_certificate_key /etc/letsencrypt/live/natsudomari-fishing.duckdns.org/privkey.pem; # 秘密鍵

  client_max_body_size 10M; # ファイルアップロードの最大サイズ(10MB)

  # /apiで始まるリクエスト → Laravel(php-fpm)
  location /api {
    include fastcgi_params; # php-fpmに渡す標準パラメータ群
    fastcgi_pass php:9000; # phpコンテナの9000番へ転送
    fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
    fastcgi_read_timeout 60;
  }

  # /storage → アップロード画像を直接配信
  # ※S3移行後は画像はS3配信が基本だが、ローカル保存経路として残す
  location /storage {
    alias /var/www/backend/storage/app/public; # storage/app/publicの中身を返す
    expires 1d; # ブラウザに1日キャッシュさせる
  }

  # それ以外 → Nuxt(SSRサーバー)へプロキシ
  location / {
    proxy_pass http://node:3000; # nodeコンテナの3000番へ転送
    proxy_http_version 1.1; # WebSocket等に必要
    proxy_set_header Upgrade $http_upgrade; # WebSocketアップグレード要求を引き継ぐ
    proxy_set_header Connection 'upgrade'; # 同上（接続をupgradeに切り替え)
    proxy_set_header Host $host; # 元のホスト名をNuxtに伝える
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 元のアクセス元IPをNuxtに伝える
    proxy_set_header X-Forwarded-Proto $scheme; # 元のアクセスがhttpsだったことをNuxtに伝える
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400; # WebSocket長時間接続に対応(秒)
  }
}
