# Nginxのバーチャルホスト設定
# リクエストのURLパスを見て、どのコンテナに転送するか決める

server {
  listen 80;
  client_max_body_size 10M; # ファイルアップロードの最大サイズを10MBに設定

  location /api {
    include fastcgi_params; # php-FPMに必要な標準パラメータ群を読み込む

    fastcgi_pass php:9000; # phpコンテナの9000番ポートに転送

    fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php; # LaravelへのリクエストををIndex.phpで受け取り内部ルーティング

    fastcgi_read_timeout 60; # php処理の最大待ち時間(秒)
  }

  # /storageで始まるリクエスト → アップロードされた画像を配信
  # Laravelで storage:link すると storage/app/public が public/storage にリンクされる
  # nginxが直接ファイルを渡すのでPHPを通さず高速
  location /storage {
    alias /var/www/backend/storage/app/public;
    expires 1d;
  }

  # それ以外のリクエスト → Nuxt.jsの開発サーバーにプロキシ
  location / {
    proxy_pass http://node:3000; # nodeコンテナの3000番ポートに転送

    # webSocket対応の設定(Nuxt.jsのホットリロードに必要)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;

    proxy_read_timeout 86400; # WebSocketの長時間接続に対応(秒)
  }
}